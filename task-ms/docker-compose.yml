
services:
  postgres:
    image: postgres
    container_name: task-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:7
    container_name: task-redis
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data
    command: [ "redis-server", "--appendonly", "yes" ]


volumes:
  pgdata:
  redisdata: